version: '3.9'

services:

  # ── ML prediction service ──────────────────────────────────────────────────
  ml-service:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: credit-card-default-predictor:latest
    container_name: ml-service
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - DEBUG=false
      - AB_SPLIT_V2=0.5        # 50% traffic to model v2
    volumes:
      - ./logs:/app/logs       # persist logs outside container
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ── NGINX reverse proxy (production-like) ─────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: nginx-proxy
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      ml-service:
        condition: service_healthy
    restart: unless-stopped

  # ── Log watcher (simulates ELK-style log aggregation) ────────────────────
  log-monitor:
    image: alpine:latest
    container_name: log-monitor
    command: >
      sh -c "while true; do
        echo '[$(date -u +%Y-%m-%dT%H:%M:%SZ)] Log monitor running — watching ml-service logs';
        sleep 30;
      done"
    depends_on:
      - ml-service
    restart: unless-stopped

volumes:
  logs:
